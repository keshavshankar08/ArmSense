<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sEMG Signal Display</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.3.0/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <h1>sEMG Signal Display</h1>
        
        <div id="semgContainer">
            <div class="semgWindow"><canvas id="semgChart0"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart1"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart2"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart3"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart4"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart5"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart6"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart7"></canvas></div>
        </div>

        <div id="controls">
            <a href="{{ url_for('data_collection') }}">
                <button>Collect Data</button>
            </a>
            <button onclick="trainModel()">Train Model</button>
            <button onclick="evaluateModel()">Evaluate Model</button>
        </div>
    </div>

    <script>
        const socket = io.connect('http://localhost:5001');

        socket.on('connect', () => {
            console.log('Connected to SocketIO server');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from SocketIO server');
        });

        const charts = [];
        const dataLength = 100; // Number of data points to display

        for (let i = 0; i < 8; i++) {
            const canvas = document.getElementById(`semgChart${i}`);
            if (!canvas) {
                console.error(`Canvas element semgChart${i} not found`);
                continue;
            }
            const ctx = canvas.getContext('2d');
            charts[i] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(dataLength).fill(''),
                    datasets: [{
                        label: `Channel ${i + 1}`,
                        data: Array(dataLength).fill(0),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1,
                        pointRadius: 0, // Hide data points
                        fill: false
                    }]
                },
                options: {
                    animation: false,
                    scales: {
                        x: { display: false },
                        y: { beginAtZero: true }
                    },
                    elements: {
                        line: { tension: 0 } // No line smoothing
                    }
                }
            });
        }

        socket.on('semg_data', function(msg) {
            console.log('Received semg_data:', msg);
            const data = msg.data; // data should be an array of 8 values
            if (Array.isArray(data)) {
                data.forEach((value, index) => {
                    console.log(`Updating chart ${index} with value ${value}`);
                    const chart = charts[index];
                    if (chart) {
                        chart.data.datasets[0].data.push(value);
                        if (chart.data.datasets[0].data.length > dataLength) {
                            chart.data.datasets[0].data.shift();
                        }
                        chart.update('none'); // Update chart without animation
                    }
                });
            } else {
                console.error('Data received is not an array:', data);
            }
        });
    </script>
</body>
</html>
