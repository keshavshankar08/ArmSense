<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sEMG Signal Display</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>sEMG Signal Display</h1>
        
        <div id="semgContainer">
            <!-- Dynamically created charts for each channel -->
            <div class="semgWindow"><canvas id="semgChart0"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart1"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart2"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart3"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart4"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart5"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart6"></canvas></div>
            <div class="semgWindow"><canvas id="semgChart7"></canvas></div>
        </div>

        <div id="controls">
            <a href="{{ url_for('data_collection') }}">
                <button>Collect Data</button>
            </a>
            <button onclick="trainModel()">Train Model</button>
            <button onclick="evaluateModel()">Evaluate Model</button>
        </div>
    </div>

    <script>
        const socket = io.connect('http://localhost:5001');
    
        socket.on('connect', () => {
            console.log('Connected to SocketIO server');
        });
    
        socket.on('disconnect', () => {
            console.log('Disconnected from SocketIO server');
        });
    
        const charts = [];
        const dataLength = 100; // Number of data points to display
    
        // Initialize charts for 8 channels
        for (let i = 0; i < 8; i++) {
            const canvas = document.getElementById(`semgChart${i}`);
            if (!canvas) {
                console.error(`Canvas element semgChart${i} not found`);
                continue;
            }
            const ctx = canvas.getContext('2d');
            charts[i] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(dataLength).fill(''), // Empty labels, only showing data points
                    datasets: [{
                        label: `Channel ${i + 1}`,
                        data: Array(dataLength).fill(0), // Initialize with 0s
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1,
                        pointRadius: 0, // Hide individual data points
                        fill: false
                    }]
                },
                options: {
                    animation: false, // Disable animation for real-time update
                    scales: {
                        x: { display: false }, // Hide x-axis labels
                        y: { beginAtZero: true }
                    },
                    elements: {
                        line: { tension: 0 } // Straight lines (no smoothing)
                    }
                }
            });
        }
    
        // Listen for sEMG data from the server
        socket.on('semg_data', function(msg) {
            console.log('Received data:', msg); // Debug log
            
            if (!msg.data || !Array.isArray(msg.data) || msg.data.length !== 8) {
                console.error('Invalid data format received:', msg);
                return;
            }
            
            msg.data.forEach((value, index) => {
                const chart = charts[index];
                if (chart) {
                    // Add new data point
                    const numericValue = Number(value);
                    console.log(`Channel ${index}: ${numericValue}`); // Debug log
                    chart.data.datasets[0].data.push(numericValue);
                    // Remove oldest data point if we exceed dataLength
                    if (chart.data.datasets[0].data.length > dataLength) {
                        chart.data.datasets[0].data.shift();
                    }
                    // Update the chart without animation
                    chart.update('none');
                }
            });
        });
    
        function trainModel() {
            // Dummy function for training model
            console.log('Training model...');
        }
    
        function evaluateModel() {
            // Dummy function for evaluating model
            console.log('Evaluating model...');
        }
    </script>
    

</body>
</html>
