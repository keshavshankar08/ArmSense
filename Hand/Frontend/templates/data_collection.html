<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Collection - Make a Fist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .instruction-container {
            text-align: center;
            margin-top: 20px;
        }
        #fistImage {
            max-width: 300px;
            margin: 20px auto;
            display: block;
        }
        #counter {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }
        #message {
            font-size: 18px;
            margin-top: 20px;
        }
        #startButton {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #startButton:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Data Collection: Make a Fist</h1>
        
        <div class="instruction-container">
            <p>Please make a fist when instructed. Repeat 3 times.</p>
            <img id="fistImage" src="{{ url_for('static', filename='fist_image.jpg') }}" alt="Person making a fist">
            <div id="counter">Repetitions: <span id="repCount">0</span>/3</div>
            <div id="message"></div>
            <button id="startButton" onclick="startRepetitions()">Start</button>
        </div>
    </div>

    <script>
        let repCount = 0;
        const totalReps = 3;
        const gestureLabel = 1;  // Gesture label for 'Fist'
        const duration = 3;      // Duration for each data collection in seconds

        function startRepetitions() {
            document.getElementById('startButton').style.display = 'none';
            collectData();
        }

        function collectData() {
            if (repCount < totalReps) {
                repCount++;
                document.getElementById('repCount').textContent = repCount;
                document.getElementById('message').textContent = "Make a fist now!";

                // Send request to start data collection
                fetch('/start_data_collection', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        gesture_label: gestureLabel
                    })
                }).then(response => response.json())
                  .then(data => {
                    if (data.success) {
                        // Wait for the duration of data collection
                        setTimeout(() => {
                            document.getElementById('message').textContent = "Relax your hand.";

                            // Send request to stop data collection
                            fetch('/stop_data_collection', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                }
                            }).then(response => response.json())
                              .then(data => {
                                if (data.success) {
                                    setTimeout(() => {
                                        if (repCount < totalReps) {
                                            document.getElementById('message').textContent = "Prepare for next repetition...";
                                            setTimeout(collectData, 2000);
                                        } else {
                                            finishCollection();
                                        }
                                    }, 2000);
                                } else {
                                    console.error('Failed to stop data collection:', data.error);
                                }
                            })
                            .catch(error => console.error('Error stopping data collection:', error));

                        }, duration * 1000); // Wait for data collection duration
                    } else {
                        console.error('Failed to start data collection:', data.error);
                    }
                })
                .catch(error => console.error('Error starting data collection:', error));
            }
        }

        function finishCollection() {
            document.getElementById('message').textContent = "Data collection complete!";
            // Redirect to next gesture
            setTimeout(() => {
                window.location.href = "{{ url_for('peace_sign') }}";
            }, 3000);
        }
    </script>
</body>
</html>
